<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Comercial - Gráfica</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <h1>CRM Gráfica</h1>
                <p>Sistema de Gestão Comercial</p>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Senha" required>
                    <button type="submit">Entrar no Sistema</button>
                    <div id="login-error" class="error"></div>
                </form>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-screen" class="screen">
            <nav class="sidebar">
                <div class="logo">CRM Broker Art & Design</div>
                <ul class="menu">
                    <li><a href="#" data-page="dashboard">Dashboard</a></li>
                    <li><a href="#" data-page="clientes">Clientes</a></li>
                    <li><a href="#" data-page="orcamentos">Orçamentos</a></li>
                    <li><a href="#" data-page="pedidos">Pedidos</a></li>
                    <li><a href="#" data-page="metas">Metas</a></li>
                    <li><a href="#" data-page="relatorios">Relatórios</a></li>
                    <li><a href="#" id="logout">Sair</a></li>
                </ul>
            </nav>

            <main class="content">
                <div id="page-content"></div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
